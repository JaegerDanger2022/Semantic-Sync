<!DOCTYPE html>
<html>
<head>
  <title>Redirecting to Semantic Sync...</title>
  <meta charset="utf-8" />
</head>
<body>
  <p>Opening Semantic Sync in VS Code...</p>
  <script>
    // Read query params sent by GitHub after OAuth (code, state, etc.)
    const params = new URLSearchParams(window.location.search);

    // Redirect to the VS Code URI handler
    // URI authority: publisher.name = MartinMensah-Solomon.semantic-sync
    window.location.href = 'vscode://MartinMensah-Solomon.semantic-sync/auth-callback?' + params.toString();
  </script>
</body>
</html>
